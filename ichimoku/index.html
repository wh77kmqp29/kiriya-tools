<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>いちもく</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--pri:#0f0f0f;--acc:#ff6b35;--acc2:#ff8f65;--bg:#111;--card:#1a1a1a;--card2:#222;--text:#e8e8e8;--text-l:#666;--done:#00d4aa;--border:#2a2a2a;--ai:#8b5cf6;--ai-l:rgba(139,92,246,.1);--shadow:0 4px 20px rgba(0,0,0,.3);--radius:16px}
html,body{height:100%;font-family:'Hiragino Sans','Noto Sans JP',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}
body{max-width:1024px;margin:0 auto;display:flex;flex-direction:column;min-height:100dvh}

/* LOCK SCREEN */
.lock-screen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.lock-screen.hidden{display:none}
.lock-icon{font-size:48px;opacity:.6}
.lock-title{font-size:20px;font-weight:800;letter-spacing:2px;color:var(--text)}
.lock-title span{color:var(--acc)}
.lock-input{width:260px;padding:16px;border:2px solid var(--border);border-radius:14px;font-size:16px;outline:none;background:var(--card);color:var(--text);text-align:center;letter-spacing:4px}
.lock-input:focus{border-color:var(--acc)}
.lock-input::placeholder{letter-spacing:0;font-size:13px}
.lock-btn{width:260px;padding:16px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer}
.lock-btn:active{transform:scale(.97)}
.lock-error{color:#ef5350;font-size:13px;min-height:20px}
.lock-setup-note{font-size:12px;color:var(--text-l);max-width:260px;text-align:center;line-height:1.6}

/* HEADER */
.header{background:linear-gradient(135deg,#1a1a1a,#0f0f0f);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.header h1{font-size:22px;font-weight:800;letter-spacing:3px}
.header h1 span{color:var(--acc)}
.header-right{text-align:right;display:flex;align-items:center;gap:10px}
.header-date{font-size:12px;color:var(--text-l)}
.icon-btn{background:var(--card2);border:1px solid var(--border);color:var(--text-l);border-radius:10px;padding:8px 10px;font-size:14px;cursor:pointer;transition:all .2s}
.icon-btn:hover{border-color:var(--acc);color:var(--acc)}

/* TABS */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.tab{flex:1;text-align:center;padding:14px 0;font-size:12px;font-weight:700;color:var(--text-l);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:1px;text-transform:uppercase}
.tab.active{color:var(--acc);border-bottom-color:var(--acc)}

/* VIEWS */
.view{display:none;flex:1;overflow-y:auto;padding-bottom:180px}
.view.active{display:flex;flex-direction:column}

/* STATS */
.stats-row{display:flex;gap:8px;padding:16px 16px 8px}
.stat{flex:1;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 12px;text-align:center}
.stat-num{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-label{font-size:10px;color:var(--text-l);margin-top:4px;letter-spacing:1px;text-transform:uppercase}
.progress-wrap{padding:12px 16px 4px}
.progress-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--done));border-radius:2px;transition:width .6s ease}
.progress-label{text-align:right;font-size:11px;color:var(--text-l);margin-top:6px;padding-right:2px}

/* TASK LIST */
.section-label{font-size:10px;font-weight:700;color:var(--text-l);padding:16px 20px 8px;letter-spacing:2px;text-transform:uppercase}
.task-list{padding:0 12px}
.task-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;transition:all .3s}
.task-item.done{opacity:.4}
.task-item.done .task-name{text-decoration:line-through;color:var(--text-l)}
.task-check{width:24px;height:24px;border-radius:8px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .25s;margin-top:1px}
.task-check.checked{background:var(--done);border-color:var(--done);color:#fff}
.task-check.checked::after{content:'✓';font-size:12px;font-weight:700}
.task-body{flex:1;min-width:0}
.task-name{font-size:14px;font-weight:600;word-break:break-word;line-height:1.5}
.task-meta{display:flex;align-items:center;gap:8px;margin-top:6px}
.task-cat{font-size:10px;color:var(--text-l);background:var(--card2);padding:3px 8px;border-radius:6px;letter-spacing:.5px}
.priority-tag{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:600}
.priority-tag.p1{background:rgba(239,83,80,.15);color:#ef5350}
.priority-tag.p2{background:rgba(255,167,38,.15);color:#ffa726}
.priority-tag.p3{background:rgba(102,187,106,.15);color:#66bb6a}
.task-actions{display:flex;gap:2px;flex-shrink:0}
.task-btn{background:none;border:none;font-size:14px;cursor:pointer;padding:6px;opacity:.3;transition:opacity .2s;color:var(--text)}
.task-btn:hover{opacity:.8}

/* AI STEPS */
.ai-steps{margin-top:12px;background:var(--ai-l);border-radius:12px;padding:14px;border-left:3px solid var(--ai)}
.ai-steps-title{font-size:10px;font-weight:700;color:var(--ai);margin-bottom:10px;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.ai-step{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(139,92,246,.1)}
.ai-step:last-child{border-bottom:none}
.ai-step-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .2s;margin-top:1px}
.ai-step-check.checked{background:var(--done);border-color:var(--done);color:#fff}
.ai-step-check.checked::after{content:'✓'}
.ai-step-num{color:var(--ai);font-size:12px;font-weight:800;flex-shrink:0;margin-top:2px;min-width:16px}
.ai-step-text{flex:1;font-size:13px;line-height:1.6;color:var(--text)}
.ai-btn{background:var(--ai);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:12px;font-weight:700;cursor:pointer;margin-top:10px;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
.ai-btn:hover{opacity:.9}
.ai-btn:disabled{opacity:.4;cursor:default}
.ai-btn:active{transform:scale(.97)}
.ai-loading{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.empty-state{text-align:center;padding:60px 20px;color:var(--text-l)}
.empty-state .icon{font-size:48px;margin-bottom:12px;opacity:.5}
.empty-state p{font-size:13px;line-height:2}

/* ADD PANEL */
.add-panel{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:12px 16px env(safe-area-inset-bottom,12px);z-index:60;max-width:1024px;margin:0 auto}
.add-row{display:flex;gap:8px}
.add-input{flex:1;padding:14px 16px;border:2px solid var(--border);border-radius:12px;font-size:14px;outline:none;background:var(--card2);color:var(--text)}
.add-input:focus{border-color:var(--acc)}
.add-input::placeholder{color:var(--text-l)}
.add-btn{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;border:none;border-radius:12px;padding:14px 20px;font-size:14px;font-weight:700;cursor:pointer}
.add-btn:active{transform:scale(.96)}
.add-options{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.add-opt{padding:7px 12px;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--card2);color:var(--text-l);transition:all .2s}
.add-opt.active{background:rgba(255,107,53,.15);border-color:var(--acc);color:var(--acc)}
.saved-tasks-toggle{font-size:11px;color:var(--acc);cursor:pointer;font-weight:600;padding:6px 0;text-align:center;margin-top:4px;letter-spacing:.5px}

/* DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:70;display:none}
.drawer-overlay.open{display:block}
.drawer{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:20px 20px 0 0;max-height:70dvh;overflow-y:auto;z-index:80;padding:20px 16px 40px;max-width:1024px;margin:0 auto;display:none;animation:slideUp .3s}
.drawer.open{display:block}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.drawer h3{font-size:16px;font-weight:700;margin-bottom:4px}
.drawer .sub{font-size:12px;color:var(--text-l);margin-bottom:16px}
.drawer-item{display:flex;align-items:center;gap:12px;padding:14px;background:var(--card2);border:1px solid var(--border);border-radius:12px;margin-bottom:6px;cursor:pointer;transition:all .2s}
.drawer-item:active{border-color:var(--acc)}
.drawer-item .name{flex:1;font-size:13px;font-weight:600}
.drawer-item .cat{font-size:10px;color:var(--text-l)}
.drawer-item .add-icon{color:var(--acc);font-size:18px;font-weight:700}
.drawer-search{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:12px;font-size:13px;outline:none;margin-bottom:12px;background:var(--card2);color:var(--text)}
.drawer-search:focus{border-color:var(--acc)}
.hidden-label{font-size:10px;color:var(--text-l);padding:8px 4px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.restore-btn{background:none;border:none;font-size:11px;color:var(--acc);cursor:pointer;font-weight:600}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px}
.cal-header h2{font-size:18px;font-weight:700}
.cal-nav-btn{background:var(--card2);border:1px solid var(--border);color:var(--text-l);border-radius:10px;padding:10px 16px;font-size:14px;cursor:pointer}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:0 12px}
.cal-day-label{text-align:center;font-size:10px;color:var(--text-l);font-weight:700;padding:8px 0;letter-spacing:1px}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;cursor:pointer;transition:all .2s;position:relative;font-size:13px;font-weight:500;color:var(--text-l)}
.cal-cell:hover{background:var(--card2)}
.cal-cell.today{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-weight:700}
.cal-cell.has-tasks::after{content:'';width:5px;height:5px;border-radius:50%;background:var(--acc);position:absolute;bottom:5px}
.cal-cell.today.has-tasks::after{background:#fff}
.cal-cell.other-month{color:#333}
.cal-cell.selected{outline:2px solid var(--acc);outline-offset:-2px}
.cal-detail{padding:16px;margin:12px 12px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius)}
.cal-detail h3{font-size:14px;font-weight:700;margin-bottom:12px}
.cal-detail-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.cal-detail-item:last-child{border-bottom:none}
.cal-detail-item .check-icon{font-size:13px}
.cal-detail-item .name{font-size:13px;flex:1}
.cal-detail-item .done-name{text-decoration:line-through;color:var(--text-l)}
.cal-detail-empty{text-align:center;padding:20px;color:var(--text-l);font-size:12px}
.cal-detail-add{display:flex;gap:8px;margin-top:12px}
.cal-detail-input{flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:12px;outline:none;background:var(--card2);color:var(--text)}
.cal-detail-btn{background:var(--acc);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:12px;font-weight:700;cursor:pointer}

/* SETTINGS */
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:90;display:none;align-items:center;justify-content:center}
.settings-overlay.open{display:flex}
.settings-modal{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 24px;width:90%;max-width:380px;animation:slideUp .3s}
.settings-modal h3{font-size:16px;font-weight:700;margin-bottom:20px}
.settings-label{font-size:11px;font-weight:700;color:var(--text-l);margin-bottom:6px;margin-top:16px;letter-spacing:.5px}
.settings-input{width:100%;padding:14px;border:2px solid var(--border);border-radius:12px;font-size:13px;outline:none;font-family:monospace;background:var(--card2);color:var(--text)}
.settings-input:focus{border-color:var(--ai)}
.settings-note{font-size:10px;color:var(--text-l);margin-top:6px;line-height:1.6}
.settings-save{background:linear-gradient(135deg,var(--ai),#a78bfa);color:#fff;border:none;border-radius:12px;padding:14px;width:100%;font-size:14px;font-weight:700;cursor:pointer;margin-top:20px}
.settings-close{background:var(--card2);border:1px solid var(--border);color:var(--text-l);border-radius:12px;padding:12px;width:100%;font-size:13px;cursor:pointer;margin-top:8px}
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-icon">🔒</div>
  <div class="lock-title">いち<span>もく</span></div>
  <div id="lockBody"></div>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none;flex-direction:column;min-height:100dvh">
  <div class="header">
    <div>
      <h1>いち<span>もく</span></h1>
    </div>
    <div class="header-right">
      <div class="header-date" id="headerDate"></div>
      <button class="icon-btn" onclick="openSettings()">⚙️</button>
      <button class="icon-btn" onclick="lockApp()">🔒</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchView('today')">📋 TODAY</div>
    <div class="tab" onclick="switchView('calendar')">📅 CALENDAR</div>
  </div>

  <div class="view active" id="viewToday">
    <div class="stats-row">
      <div class="stat"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Tasks</div></div>
      <div class="stat"><div class="stat-num" id="statDone">0</div><div class="stat-label">Done</div></div>
      <div class="stat"><div class="stat-num" id="statStreak">0</div><div class="stat-label">Streak</div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-label" id="progressLabel">0%</div>
    </div>
    <div class="section-label">Tasks</div>
    <div class="task-list" id="taskList"></div>
  </div>

  <div class="view" id="viewCalendar">
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="calMove(-1)">◀</button>
      <h2 id="calTitle"></h2>
      <button class="cal-nav-btn" onclick="calMove(1)">▶</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div id="calDetail"></div>
  </div>

  <div class="add-panel" id="addPanel">
    <div class="add-row">
      <input class="add-input" id="addInput" placeholder="タスクを入力..." autocomplete="off">
      <button class="add-btn" onclick="addTask()">追加</button>
    </div>
    <div class="add-options">
      <div class="add-opt active" data-pri="1" onclick="setPri(1)">🔴 高</div>
      <div class="add-opt" data-pri="2" onclick="setPri(2)">🟠 中</div>
      <div class="add-opt" data-pri="3" onclick="setPri(3)">🟢 低</div>
      <div style="flex:1"></div>
      <div class="add-opt" data-cat="開発" onclick="setCat(this)">💻 開発</div>
      <div class="add-opt" data-cat="マーケ" onclick="setCat(this)">📢 マーケ</div>
      <div class="add-opt" data-cat="SNS" onclick="setCat(this)">📱 SNS</div>
      <div class="add-opt" data-cat="他" onclick="setCat(this)">📌 他</div>
    </div>
    <div class="saved-tasks-toggle" onclick="openDrawer()">📂 保存済みから選ぶ</div>
  </div>
</div>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <h3>📂 保存済みタスク</h3>
  <div class="sub">タップで今日に追加</div>
  <input class="drawer-search" id="drawerSearch" placeholder="🔍 検索..." oninput="renderDrawer()">
  <div id="drawerList"></div>
  <div class="hidden-label" id="hiddenLabel" style="display:none">非表示</div>
  <div id="hiddenList"></div>
</div>

<div class="settings-overlay" id="settingsOverlay" onclick="if(event.target===this)closeSettings()">
  <div class="settings-modal">
    <h3>⚙️ 設定</h3>
    <div class="settings-label">Claude APIキー</div>
    <input class="settings-input" id="apiKeyInput" type="password" placeholder="sk-ant-...">
    <div class="settings-note">🔒 端末内にのみ保存。Claude API通信時のみ使用。</div>
    <div class="settings-label">パスワード変更</div>
    <input class="settings-input" id="pwChangeInput" type="password" placeholder="新しいパスワード">
    <div class="settings-note">空欄で保存するとパスワードロックが解除されます。</div>
    <button class="settings-save" onclick="saveSettings()">💾 保存</button>
    <button class="settings-close" onclick="closeSettings()">キャンセル</button>
  </div>
</div>

<script>
const SK='ichimoku';
const LOCK_DURATION=2*60*60*1000;
const todayKey=()=>new Date().toISOString().slice(0,10);

let library=JSON.parse(localStorage.getItem(SK+'_lib')||'[]');
let dayData=JSON.parse(localStorage.getItem(SK+'_days')||'{}');
let apiKey=localStorage.getItem(SK+'_apikey')||'';
let password=localStorage.getItem(SK+'_pw')||'';
let currentPri=1,currentCat='';
let calYear,calMonth,calSelected=null;

function saveLib(){localStorage.setItem(SK+'_lib',JSON.stringify(library))}
function saveDays(){localStorage.setItem(SK+'_days',JSON.stringify(dayData))}
function getDayTasks(k){if(!dayData[k])dayData[k]=[];return dayData[k]}
function todayTasks(){return getDayTasks(todayKey())}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// === LOCK ===
function initLock(){
  const unlockUntil=parseInt(localStorage.getItem(SK+'_unlock')||'0');
  if(!password){showApp();return}
  if(Date.now()<unlockUntil){showApp();return}
  showLockInput();
}
function showLockInput(){
  document.getElementById('lockScreen').classList.remove('hidden');
  document.getElementById('mainApp').style.display='none';
  document.getElementById('lockBody').innerHTML=`
    <input class="lock-input" id="lockPwInput" type="password" placeholder="パスワード" autofocus>
    <button class="lock-btn" onclick="tryUnlock()">ロック解除</button>
    <div class="lock-error" id="lockError"></div>
  `;
  setTimeout(()=>{const i=document.getElementById('lockPwInput');if(i)i.focus()},100);
  document.getElementById('lockPwInput')?.addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock()});
}
function showLockSetup(){
  document.getElementById('lockScreen').classList.remove('hidden');
  document.getElementById('mainApp').style.display='none';
  document.getElementById('lockBody').innerHTML=`
    <div class="lock-setup-note">初回起動です。パスワードを設定してください。<br>設定しない場合は空欄のまま「開始」を押してください。</div>
    <input class="lock-input" id="lockSetupInput" type="password" placeholder="パスワードを設定" autofocus>
    <button class="lock-btn" onclick="setupPassword()">開始</button>
  `;
  document.getElementById('lockSetupInput')?.addEventListener('keydown',e=>{if(e.key==='Enter')setupPassword()});
}
function setupPassword(){
  const pw=document.getElementById('lockSetupInput').value;
  password=pw;
  localStorage.setItem(SK+'_pw',pw);
  if(pw)localStorage.setItem(SK+'_unlock',String(Date.now()+LOCK_DURATION));
  showApp();
}
function tryUnlock(){
  const input=document.getElementById('lockPwInput');
  if(input.value===password){
    localStorage.setItem(SK+'_unlock',String(Date.now()+LOCK_DURATION));
    showApp();
  }else{
    document.getElementById('lockError').textContent='パスワードが違います';
    input.value='';input.focus();
  }
}
function showApp(){
  document.getElementById('lockScreen').classList.add('hidden');
  document.getElementById('mainApp').style.display='flex';
  updateHeader();renderToday();initCal();
}
function lockApp(){
  localStorage.removeItem(SK+'_unlock');
  if(password)showLockInput();
}

// === HEADER ===
function updateHeader(){
  const d=new Date();const wd=['日','月','火','水','木','金','土'][d.getDay()];
  document.getElementById('headerDate').textContent=`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}（${wd}）`;
}

// === SETTINGS ===
function openSettings(){
  document.getElementById('apiKeyInput').value=apiKey;
  document.getElementById('pwChangeInput').value='';
  document.getElementById('settingsOverlay').classList.add('open');
}
function closeSettings(){document.getElementById('settingsOverlay').classList.remove('open')}
function saveSettings(){
  apiKey=document.getElementById('apiKeyInput').value.trim();
  localStorage.setItem(SK+'_apikey',apiKey);
  const newPw=document.getElementById('pwChangeInput').value;
  if(newPw!==undefined&&document.getElementById('pwChangeInput').dataset.touched==='1'){
    password=newPw;localStorage.setItem(SK+'_pw',newPw);
    if(newPw)localStorage.setItem(SK+'_unlock',String(Date.now()+LOCK_DURATION));
  }
  closeSettings();
}
document.getElementById('pwChangeInput')?.addEventListener('input',function(){this.dataset.touched='1'});

// === PRIORITY & CATEGORY ===
function setPri(p){currentPri=p;document.querySelectorAll('.add-opt[data-pri]').forEach(e=>e.classList.toggle('active',parseInt(e.dataset.pri)===p))}
function setCat(el){
  const cat=el.dataset.cat;
  if(currentCat===cat){currentCat='';el.classList.remove('active')}
  else{document.querySelectorAll('.add-opt[data-cat]').forEach(e=>e.classList.remove('active'));currentCat=cat;el.classList.add('active')}
}

// === ADD TASK ===
function addTask(){
  const input=document.getElementById('addInput');const name=input.value.trim();if(!name)return;
  todayTasks().push({id:Date.now(),name,priority:currentPri,category:currentCat||'他',done:false,steps:null,stepsLoading:false,stepsDone:[]});
  saveDays();
  if(!library.find(l=>l.name.toLowerCase()===name.toLowerCase())){library.push({name,category:currentCat||'他',hidden:false});saveLib()}
  input.value='';renderToday();
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.activeElement.id==='addInput')addTask()});
function addFromLibrary(li){
  if(todayTasks().find(t=>t.name.toLowerCase()===li.name.toLowerCase()))return;
  todayTasks().push({id:Date.now(),name:li.name,priority:2,category:li.category,done:false,steps:null,stepsLoading:false,stepsDone:[]});
  saveDays();renderToday();closeDrawer();
}

// === TASK ACTIONS ===
function toggleDone(i){todayTasks()[i].done=!todayTasks()[i].done;saveDays();renderToday()}
function hideTask(i){todayTasks().splice(i,1);saveDays();renderToday()}
function moveTask(i,dir){
  const tasks=todayTasks();const ni=i+dir;
  if(ni<0||ni>=tasks.length)return;
  [tasks[i],tasks[ni]]=[tasks[ni],tasks[i]];saveDays();renderToday();
}

// === AI ===
async function aiDecompose(idx){
  const t=todayTasks()[idx];
  if(!apiKey){openSettings();return}
  t.stepsLoading=true;t.steps=null;t.stepsDone=[];saveDays();renderToday();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-20250414',max_tokens:512,messages:[{role:'user',content:`あなたはADHDの人を助けるタスク分解アシスタントです。以下のタスクを、すぐに行動できる具体的な3〜5ステップに分解してください。各ステップは1文で簡潔に。曖昧な表現は避け「○○を開く」「○○と入力する」レベルで具体的に。JSON配列で返してください。例：["ステップ1","ステップ2","ステップ3"]\n\nタスク：${t.name}`}]})
    });
    const data=await res.json();
    if(data.error){alert('AIエラー: '+(data.error.message||'不明'));t.stepsLoading=false;saveDays();renderToday();return}
    const text=data.content[0].text;const match=text.match(/\[[\s\S]*\]/);
    if(match){t.steps=JSON.parse(match[0]);t.stepsDone=new Array(t.steps.length).fill(false)}
  }catch(e){alert('通信エラー: '+e.message)}
  t.stepsLoading=false;saveDays();renderToday();
}
function toggleStepDone(ti,si){
  const t=todayTasks()[ti];if(!t.stepsDone)return;
  t.stepsDone[si]=!t.stepsDone[si];
  if(t.stepsDone.every(Boolean))t.done=true;
  saveDays();renderToday();
}

// === RENDER TODAY ===
function renderToday(){
  const tasks=todayTasks();const list=document.getElementById('taskList');
  if(!tasks.length){
    list.innerHTML='<div class="empty-state"><div class="icon">📝</div><p>タスクがありません<br>下から追加してください</p></div>';
  }else{
    list.innerHTML=tasks.map((t,i)=>{
      let stepsHTML='';
      if(t.stepsLoading){
        stepsHTML=`<div class="ai-steps"><div class="ai-steps-title"><div class="ai-loading"></div> 分解中...</div></div>`;
      }else if(t.steps?.length){
        stepsHTML=`<div class="ai-steps"><div class="ai-steps-title">🤖 STEPS</div>${t.steps.map((s,si)=>`
          <div class="ai-step">
            <div class="ai-step-check${t.stepsDone?.[si]?' checked':''}" onclick="toggleStepDone(${i},${si})"></div>
            <div class="ai-step-num">${si+1}.</div>
            <div class="ai-step-text">${esc(s)}</div>
          </div>`).join('')}</div>`;
      }
      const priLabel=['','高','中','低'];
      return `<div class="task-item${t.done?' done':''}">
        <div class="task-check${t.done?' checked':''}" onclick="toggleDone(${i})"></div>
        <div class="task-body">
          <div class="task-name">${esc(t.name)}</div>
          <div class="task-meta">
            <div class="task-cat">${t.category}</div>
            <div class="priority-tag p${t.priority}">${priLabel[t.priority]}</div>
          </div>
          ${!t.done&&!t.steps&&!t.stepsLoading?`<button class="ai-btn" onclick="aiDecompose(${i})">🤖 AIで分解</button>`:''}
          ${stepsHTML}
        </div>
        <div class="task-actions">
          <button class="task-btn" onclick="moveTask(${i},-1)">▲</button>
          <button class="task-btn" onclick="moveTask(${i},1)">▼</button>
          <button class="task-btn" onclick="hideTask(${i})">✕</button>
        </div>
      </div>`;
    }).join('');
  }
  const total=tasks.length,done=tasks.filter(t=>t.done).length;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statDone').textContent=done;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=total?`${pct}% （${done}/${total}）`:'0%';
  let streak=0;const d=new Date();
  if(total>0&&done===total)streak=1;d.setDate(d.getDate()-1);
  while(true){const k=d.toISOString().slice(0,10);const dt=dayData[k];if(dt?.length>0&&dt.every(t=>t.done)){streak++;d.setDate(d.getDate()-1)}else break}
  document.getElementById('statStreak').textContent=streak;
}

// === DRAWER ===
function openDrawer(){document.getElementById('drawerOverlay').classList.add('open');document.getElementById('drawer').classList.add('open');renderDrawer()}
function closeDrawer(){document.getElementById('drawerOverlay').classList.remove('open');document.getElementById('drawer').classList.remove('open')}
function renderDrawer(){
  const q=document.getElementById('drawerSearch').value.toLowerCase();
  const vis=library.filter(l=>!l.hidden&&l.name.toLowerCase().includes(q));
  const hid=library.filter(l=>l.hidden&&l.name.toLowerCase().includes(q));
  document.getElementById('drawerList').innerHTML=vis.map(l=>`
    <div class="drawer-item" onclick="addFromLibrary(library[${library.indexOf(l)}])">
      <div class="name">${esc(l.name)}<div class="cat">${l.category}</div></div>
      <div class="add-icon">＋</div>
      <button class="task-btn" onclick="event.stopPropagation();hideLibItem(${library.indexOf(l)})">🗂</button>
    </div>`).join('')||'<div style="text-align:center;padding:20px;color:var(--text-l);font-size:12px">なし</div>';
  if(hid.length){
    document.getElementById('hiddenLabel').style.display='block';
    document.getElementById('hiddenList').innerHTML=hid.map(l=>`
      <div class="drawer-item" style="opacity:.5">
        <div class="name">${esc(l.name)}<div class="cat">${l.category}</div></div>
        <button class="restore-btn" onclick="restoreLibItem(${library.indexOf(l)})">復元</button>
      </div>`).join('');
  }else{document.getElementById('hiddenLabel').style.display='none';document.getElementById('hiddenList').innerHTML=''}
}
function hideLibItem(i){library[i].hidden=true;saveLib();renderDrawer()}
function restoreLibItem(i){library[i].hidden=false;saveLib();renderDrawer()}

// === CALENDAR ===
function initCal(){const d=new Date();calYear=d.getFullYear();calMonth=d.getMonth();renderCal()}
function calMove(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++}if(calMonth<0){calMonth=11;calYear--}renderCal()}
function renderCal(){
  document.getElementById('calTitle').textContent=`${calYear}年${calMonth+1}月`;
  const grid=document.getElementById('calGrid');
  let html=['月','火','水','木','金','土','日'].map(l=>`<div class="cal-day-label">${l}</div>`).join('');
  const first=new Date(calYear,calMonth,1);let sd=first.getDay()-1;if(sd<0)sd=6;
  const dim=new Date(calYear,calMonth+1,0).getDate();const pd=new Date(calYear,calMonth,0).getDate();const tk=todayKey();
  for(let i=sd-1;i>=0;i--)html+=`<div class="cal-cell other-month">${pd-i}</div>`;
  for(let d=1;d<=dim;d++){
    const k=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    html+=`<div class="cal-cell${k===tk?' today':''}${dayData[k]?.length?' has-tasks':''}${k===calSelected?' selected':''}" onclick="selectCalDay('${k}')">${d}</div>`;
  }
  const tc=sd+dim;const rem=tc%7?7-tc%7:0;
  for(let d=1;d<=rem;d++)html+=`<div class="cal-cell other-month">${d}</div>`;
  grid.innerHTML=html;
  if(calSelected)renderCalDetail(calSelected);else document.getElementById('calDetail').innerHTML='';
}
function selectCalDay(k){calSelected=k;renderCal();renderCalDetail(k)}
function renderCalDetail(k){
  const tasks=dayData[k]||[];const d=new Date(k);const wd=['日','月','火','水','木','金','土'][d.getDay()];
  let html=`<div class="cal-detail"><h3>${d.getMonth()+1}/${d.getDate()}（${wd}）</h3>`;
  if(!tasks.length)html+=`<div class="cal-detail-empty">タスクなし</div>`;
  else tasks.forEach((t,i)=>{html+=`<div class="cal-detail-item"><div class="check-icon">${t.done?'✅':'⬜'}</div><div class="name${t.done?' done-name':''}">${esc(t.name)}</div><button class="task-btn" onclick="toggleCalTask('${k}',${i})">${t.done?'↩':'✓'}</button><button class="task-btn" onclick="removeCalTask('${k}',${i})">✕</button></div>`});
  html+=`<div class="cal-detail-add"><input class="cal-detail-input" id="calAdd_${k}" placeholder="追加..."><button class="cal-detail-btn" onclick="addCalTask('${k}')">追加</button></div></div>`;
  document.getElementById('calDetail').innerHTML=html;
}
function toggleCalTask(k,i){dayData[k][i].done=!dayData[k][i].done;saveDays();renderCalDetail(k);renderCal();if(k===todayKey())renderToday()}
function removeCalTask(k,i){dayData[k].splice(i,1);saveDays();renderCalDetail(k);renderCal();if(k===todayKey())renderToday()}
function addCalTask(k){
  const input=document.getElementById('calAdd_'+k);const name=input.value.trim();if(!name)return;
  if(!dayData[k])dayData[k]=[];
  dayData[k].push({id:Date.now(),name,priority:2,category:'他',done:false,steps:null,stepsLoading:false,stepsDone:[]});
  saveDays();if(!library.find(l=>l.name.toLowerCase()===name.toLowerCase())){library.push({name,category:'他',hidden:false});saveLib()}
  renderCalDetail(k);renderCal();if(k===todayKey())renderToday();input.value='';
}

// === VIEW SWITCH ===
function switchView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view'+name.charAt(0).toUpperCase()+name.slice(1)).classList.add('active');
  document.querySelectorAll('.tab')[name==='today'?0:1].classList.add('active');
  document.getElementById('addPanel').style.display=name==='today'?'block':'none';
  if(name==='calendar')renderCal();
}

// === INIT ===
setInterval(()=>updateHeader(),60000);
const isFirstRun=!localStorage.getItem(SK+'_pw')&&!localStorage.getItem(SK+'_apikey');
if(isFirstRun)showLockSetup();
else initLock();
</script>
