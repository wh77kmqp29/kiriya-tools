<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HealthWork Log — 健康管理・業務日報ツール</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0b0f1a;--bg2:#111827;--bg3:#1f2937;--bg4:#374151;
--accent:#6366f1;--accent2:#22d3ee;--green:#10b981;--warn:#f59e0b;--danger:#ef4444;
--text:#f1f5f9;--sub:#94a3b8;--muted:#64748b;
--border:rgba(99,102,241,.2);--glass:rgba(17,24,39,.85);
--font:'Inter','Noto Sans JP',sans-serif;
--r:8px;--r2:12px;--r3:16px;
--shadow:0 4px 12px rgba(0,0,0,.3);
--glow:0 0 20px rgba(99,102,241,.2)
}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}

/* ===== ライセンス画面 ===== */
#licScreen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center}
.lb{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r3);padding:40px;max-width:480px;width:92%;text-align:center;animation:fi .5s ease}
@keyframes fi{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.lb .ll{font-size:48px;color:var(--green);margin-bottom:16px}
.lb h1{font-size:22px;font-weight:700;margin-bottom:4px;background:linear-gradient(90deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lb .ls{font-size:13px;color:var(--sub);margin-bottom:24px}
.lb input{width:100%;padding:12px 16px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:14px;font-family:var(--font);outline:none;margin-bottom:12px;transition:.3s}
.lb input:focus{border-color:var(--accent);box-shadow:0 0 10px rgba(99,102,241,.2)}
.lb .lbtn{width:100%;padding:12px;border:none;border-radius:var(--r);color:#fff;font-size:15px;font-weight:600;font-family:var(--font);cursor:pointer;transition:.3s;margin-bottom:8px}
.lb .lbtn.pro{background:linear-gradient(135deg,var(--accent),#4f46e5)}
.lb .lbtn.demo{background:var(--bg4)}
.lb .lbtn:hover{transform:scale(1.02);box-shadow:var(--glow)}
.lb .le{color:var(--danger);font-size:12px;margin-top:8px;min-height:18px}
.lb .lf{margin-top:20px;font-size:11px;color:var(--sub)}.lb .lf a{color:var(--accent);text-decoration:none}
.demo-banner{display:none;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);padding:6px 14px;text-align:center;font-size:12px;color:var(--danger);cursor:pointer}
.demo-banner a{color:var(--warn);font-weight:600;text-decoration:underline;margin-left:6px}
.wm-overlay{display:none;position:fixed;inset:0;pointer-events:none;z-index:900}
.wm-overlay.show{display:block}
.wm-overlay::before{content:'SAMPLE';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-30deg);font-size:100px;font-weight:900;color:rgba(239,68,68,.06);pointer-events:none}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;margin-left:8px}
.badge.pro{background:linear-gradient(135deg,var(--warn),#f0932b);color:#1a1a3e}
.badge.demo-b{background:rgba(239,68,68,.2);color:var(--danger)}

/* ===== アプリ本体 ===== */
#app{display:none;flex-direction:column;height:100vh}
#hdr{height:56px;background:var(--glass);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;z-index:100;position:relative}
#hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--green))}
.hl{display:flex;align-items:center;gap:10px;min-width:200px}
.hl i{font-size:22px;color:var(--green)}
.hl span{font-size:16px;font-weight:700;background:linear-gradient(90deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hc{flex:1;display:flex;align-items:center;justify-content:center;gap:12px}
.hc select,.hc input{padding:6px 12px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:13px;font-family:var(--font);outline:none}
.hc select:focus,.hc input:focus{border-color:var(--accent)}
.hc select option{background:var(--bg3);color:var(--text)}
.hc input{width:120px}
.hr{display:flex;align-items:center;gap:8px;min-width:200px;justify-content:flex-end}
.hbtn{height:34px;padding:0 14px;border:1px solid var(--border);background:rgba(255,255,255,.04);border-radius:var(--r);color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:.3s;font-size:12px;font-family:var(--font);font-weight:600}
.hbtn:hover{color:var(--accent);border-color:var(--accent);box-shadow:var(--glow)}
.hbtn.active{color:var(--warn);border-color:var(--warn)}

/* ===== タブバー ===== */
.tab-bar{display:flex;background:var(--bg2);padding:0 20px;gap:4px;border-bottom:1px solid var(--border)}
.tab-btn{padding:12px 28px;background:none;color:var(--muted);border:none;border-bottom:3px solid transparent;margin-bottom:-1px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);transition:.3s;display:flex;align-items:center;gap:6px}
.tab-btn:hover{color:var(--sub)}
.tab-btn.active{color:var(--text);border-bottom-color:var(--accent);background:rgba(99,102,241,.06)}

/* ===== メインエリア ===== */
.main-wrap{flex:1;overflow-y:auto;padding:18px 20px}
.tab-page{display:none}.tab-page.active{display:block}

/* 週バー */
.week-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.week-btn{padding:7px 18px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg3);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);transition:.3s;color:var(--sub)}
.week-btn:hover{border-color:var(--accent);color:var(--accent)}
.week-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 10px rgba(99,102,241,.3)}

/* 統計バー */
.stat-bar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.stat-card{background:var(--glass);border:1px solid var(--border);border-radius:var(--r2);padding:12px 18px;backdrop-filter:blur(10px);display:flex;align-items:center;gap:8px;font-size:12px;color:var(--sub)}
.stat-card strong{font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-card.gn strong{background:linear-gradient(135deg,var(--green),#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-card.wr strong{background:linear-gradient(135deg,var(--warn),#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* カードグリッド */
.day-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:12px}

/* カード */
.day-card{background:var(--glass);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;transition:.3s;backdrop-filter:blur(10px)}
.day-card:hover{border-color:rgba(99,102,241,.4);box-shadow:var(--glow)}
.dc-hd{padding:10px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.dc-hd.hlt{background:linear-gradient(135deg,var(--accent),#4f46e5);color:#fff}
.dc-hd.dlt{background:linear-gradient(135deg,var(--green),#059669);color:#fff}
.dc-bd{padding:14px 16px}
.fld{margin-bottom:12px}.fld:last-child{margin-bottom:0}
.fld-lb{font-size:11px;font-weight:700;color:var(--sub);margin-bottom:5px;letter-spacing:.03em;display:flex;align-items:center;gap:5px}
.fld-lb i{font-size:10px;color:var(--accent)}

/* ピル */
.pg{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px}
.pill{padding:4px 14px;border-radius:16px;border:1.5px solid var(--border);font-size:11px;font-weight:500;cursor:pointer;user-select:none;transition:.15s;background:var(--bg3);color:var(--sub);display:inline-flex;align-items:center;gap:3px;white-space:nowrap}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.sel{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 1px 6px rgba(99,102,241,.3)}
.pill.sel-g{background:var(--green);color:#fff;border-color:var(--green);box-shadow:0 1px 6px rgba(16,185,129,.3)}
.pill .pdel{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.25);display:none;align-items:center;justify-content:center;font-size:9px;cursor:pointer;margin-left:2px}
.pill.cust .pdel{display:inline-flex}

/* 追加行 */
.add-row{display:flex;gap:5px;align-items:center;margin-top:5px}
.add-row input{flex:1;padding:5px 10px;border:1.5px dashed var(--border);border-radius:var(--r);font-size:11px;font-family:var(--font);background:var(--bg3);color:var(--text);outline:none;transition:.3s}
.add-row input:focus{border-color:var(--accent)}
.add-row button{padding:5px 12px;border:none;border-radius:var(--r);background:var(--accent);color:#fff;font-size:11px;font-weight:700;cursor:pointer;transition:.3s}

/* 入力欄 */
.ti{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:var(--font);transition:.3s;resize:vertical;line-height:1.6;background:rgba(255,255,255,.04);color:var(--text);outline:none}
.ti:focus{border-color:var(--accent);box-shadow:0 0 8px rgba(99,102,241,.15)}
.time-r{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.time-r select{padding:6px 8px;border:1px solid var(--border);border-radius:var(--r);font-size:12px;font-family:var(--font);background:var(--bg3);color:var(--text);outline:none}
.time-r select:focus{border-color:var(--accent)}
.time-r span{font-size:11px;color:var(--muted);font-weight:600}

/* スケジュールブロック */
.sb{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:8px;transition:.3s}
.sb:hover{border-color:rgba(99,102,241,.3)}
.sb-top{display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.sb-top select,.sb-top input{padding:5px 8px;border:1px solid var(--border);border-radius:var(--r);font-size:11px;font-family:var(--font);background:var(--bg3);color:var(--text);outline:none}
.btn-rm{width:24px;height:24px;border-radius:50%;border:none;background:rgba(239,68,68,.15);color:var(--danger);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:.3s}
.btn-rm:hover{background:var(--danger);color:#fff}
.btn-add-s{padding:6px 16px;border-radius:var(--r);border:1px dashed var(--border);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);transition:.3s;background:transparent;color:var(--green)}
.btn-add-s:hover{border-color:var(--green);background:rgba(16,185,129,.1)}

/* ===== ダッシュボード ===== */
.dash{max-width:900px;margin:0 auto}
.dash-title{font-size:20px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.dash-title i{color:var(--warn)}
.dash-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.dcard{background:var(--glass);border:1px solid var(--border);border-radius:var(--r2);padding:16px;text-align:center;backdrop-filter:blur(10px)}
.dcard .dv{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.dcard .dl{font-size:11px;color:var(--sub);margin-top:4px}
.dash-section{background:var(--glass);border:1px solid var(--border);border-radius:var(--r2);padding:18px;margin-bottom:12px;backdrop-filter:blur(10px)}
.dash-section h3{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.dash-section h3 i{color:var(--accent)}
.chart-bar{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.chart-bar .cbl{width:90px;text-align:right;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chart-bar .cbr{flex:1;height:18px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden;position:relative}
.chart-bar .cbf{height:100%;border-radius:3px;transition:width .6s ease}
.chart-bar .cbn{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:600}
.report-box{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:var(--r);padding:14px;font-size:12px;line-height:1.8;white-space:pre-wrap;max-height:400px;overflow-y:auto;color:var(--sub)}

/* ===== トースト ===== */
.toast{position:fixed;bottom:24px;right:20px;z-index:5000;padding:10px 20px;border-radius:var(--r);font-size:12px;font-weight:600;color:#fff;opacity:0;transform:translateY(16px);transition:.3s;pointer-events:none;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:var(--green)}.toast.info{background:var(--accent)}.toast.warn{background:var(--warn)}

/* ===== モーダル ===== */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:1500;display:none;align-items:center;justify-content:center}
.mo.show{display:flex}
.mo-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r3);padding:28px;max-width:560px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,.4);animation:fi .25s ease}
.mo-box h3{font-size:18px;margin-bottom:12px;color:var(--text)}
.mo-box p{font-size:13px;color:var(--sub);margin-bottom:16px;line-height:1.8}
.mo-btns{display:flex;gap:10px;justify-content:flex-end}
.mo-btns button{padding:10px 24px;border-radius:var(--r);border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);transition:.3s}
.mb-c{background:var(--bg4);color:var(--sub)}.mb-c:hover{background:var(--muted);color:#fff}
.mb-ok{background:var(--danger);color:#fff}.mb-ok:hover{background:#dc2626}
.bk-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;font-size:13px;color:var(--sub)}
.bk-item:hover{background:rgba(255,255,255,.03)}
.bk-item button{padding:5px 12px;border-radius:6px;border:none;font-size:11px;font-weight:700;cursor:pointer;margin-left:5px;transition:.3s}
.bk-restore{background:rgba(16,185,129,.15);color:var(--green)}.bk-restore:hover{background:rgba(16,185,129,.3)}
.bk-dl{background:rgba(99,102,241,.15);color:var(--accent)}.bk-dl:hover{background:rgba(99,102,241,.3)}
.bk-del{background:rgba(239,68,68,.15);color:var(--danger)}.bk-del:hover{background:rgba(239,68,68,.3)}

#ftr{height:30px;background:var(--glass);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 14px;font-size:10px;color:var(--muted);gap:16px}
.fti{display:flex;align-items:center;gap:3px}

@media(max-width:860px){.day-grid{grid-template-columns:1fr}.dash-cards{grid-template-columns:repeat(2,1fr)}.hc{display:none}}
@media print{
  #licScreen,#hdr,.tab-bar,.week-bar,.stat-bar,.hbtn,.add-row,.btn-add-s,.btn-rm,.pdel,.toast,.mo,.demo-banner,.wm-overlay,#ftr{display:none!important}
  .main-wrap{padding:0;max-width:100%;overflow:visible}
  .tab-page{display:none!important}.tab-page.printing{display:block!important}
  .day-grid{grid-template-columns:1fr 1fr;gap:6px}
  .day-card{background:#fff!important;border:1px solid #bbb!important;color:#222!important;backdrop-filter:none!important;break-inside:avoid}
  .day-card:hover{transform:none;box-shadow:none}
  .dc-hd,.pill.sel,.pill.sel-g{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .ti{background:#fff!important;border:1px solid #ccc!important;color:#222!important}
  @page{size:A4;margin:10mm}
  .pt{display:block!important;text-align:center;font-size:16px;font-weight:900;margin-bottom:12px;color:#111}
}
.pt{display:none}
</style>
</head>
<body>

<!-- ===== ライセンス認証 ===== -->
<div id="licScreen">
  <div class="lb">
    <div class="ll"><i class="fa-solid fa-heart-pulse"></i></div>
    <h1>HealthWork Log</h1>
    <div class="ls">健康管理と業務日報を一元管理するプロフェッショナルツール</div>
    <input type="text" id="licKey" placeholder="ライセンスキーを入力...">
    <button class="lbtn pro" id="licBtn">アクティベート</button>
    <button class="lbtn demo" id="demoBtn">デモ版で試す</button>
    <div class="le" id="licErr"></div>
    <div class="lf"><a href="https://wh77kmqp29.github.io/kiriya-tools/" target="_blank">ライセンスを購入する →</a></div>
  </div>
</div>

<div class="wm-overlay" id="wmOverlay"></div>
<div class="demo-banner" id="demoBanner">デモ版で使用中です — 3日分のみ記入可能です<a href="https://wh77kmqp29.github.io/kiriya-tools/" target="_blank">製品版を購入</a></div>

<div id="app">
  <header id="hdr">
    <div class="hl"><i class="fa-solid fa-heart-pulse"></i><span>HealthWork Log</span><span class="badge" id="modeBadge"></span></div>
    <div class="hc">
      <input type="text" id="userName" placeholder="ユーザー名">
      <select id="globalMonth"></select>
    </div>
    <div class="hr">
      <button class="hbtn" id="dashBtn"><i class="fa-solid fa-chart-pie"></i> 分析</button>
      <button class="hbtn" id="printBtn"><i class="fa-solid fa-print"></i> PDF</button>
      <button class="hbtn" id="bkBtn"><i class="fa-solid fa-box-archive"></i></button>
      <button class="hbtn" id="rstBtn" style="color:var(--danger);border-color:rgba(239,68,68,.3)"><i class="fa-solid fa-rotate-left"></i></button>
    </div>
  </header>
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="health"><i class="fa-solid fa-stethoscope"></i> 健康チェック</button>
    <button class="tab-btn" data-tab="daily"><i class="fa-solid fa-clipboard-list"></i> 業務日報</button>
    <button class="tab-btn" data-tab="dash"><i class="fa-solid fa-chart-line"></i> ダッシュボード</button>
  </div>
  <div class="main-wrap">
    <div class="tab-page active" id="page-health">
      <div class="pt" id="hPT"></div>
      <div class="stat-bar" id="hStats"></div>
      <div class="week-bar" id="hWB"></div>
      <div class="day-grid" id="hGrid"></div>
    </div>
    <div class="tab-page" id="page-daily">
      <div class="pt" id="dPT"></div>
      <div class="stat-bar" id="dStats"></div>
      <div class="week-bar" id="dWB"></div>
      <div class="day-grid" id="dGrid"></div>
    </div>
    <div class="tab-page" id="page-dash">
      <div class="dash" id="dashView"></div>
    </div>
  </div>
  <footer id="ftr">
    <div class="fti"><i class="fa-solid fa-database"></i><span id="ftK">0 KB</span></div>
    <div class="fti" style="margin-left:auto">HealthWork Log v1.0 — Kiriya Tools</div>
  </footer>
</div>

<div class="toast" id="toast"></div>
<div class="mo" id="moReset"><div class="mo-box"><h3><i class="fa-solid fa-triangle-exclamation" style="color:var(--danger)"></i> リセット確認</h3><p id="rstMsg"></p><div class="mo-btns"><button class="mb-c" id="rstNo">キャンセル</button><button class="mb-ok" id="rstYes">リセット実行</button></div></div></div>
<div class="mo" id="moBackup"><div class="mo-box" style="max-width:620px"><h3><i class="fa-solid fa-box-archive" style="color:var(--accent)"></i> バックアップ一覧</h3><div id="bkList" style="max-height:320px;overflow-y:auto;margin-bottom:14px"></div><div class="mo-btns"><button class="mb-c" id="bkClose">閉じる</button></div></div></div>

<script>
(function(){
'use strict';
const SK='hwLog';
const PURCHASE_URL='https://wh77kmqp29.github.io/kiriya-tools/';
const DEMO_MAX_DAYS=3;
const POLAR_ORG_ID='ff9b0c8c-c690-4aa4-865f-9902dd92804b';

function hashKey(s){let h=0x811c9dc5;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,0x01000193)}return(h>>>0).toString(16)}
const VALID_HASHES=['fc28e86a','a3d7c912','b7e45f01','d92c8a34'];

const DEFAULTS={

  h_mood:{lb:'前日の総合評価',it:['○ 良い','△ まあまあ','× 悪い']},

  h_body:{lb:'身体の調子',it:['○ 良い','△ まあまあ','× 悪い']},
  h_mental:{lb:'朝の気分',it:['○ 良い','△ まあまあ','× 悪い']},

const HF=['h_sleep','h_mood','h_temp','h_weather','h_meal','h_body','h_mental','h_meds','h_stress','h_overall'];
const WD=['日','月','火','水','木','金','土'];

let S={month:null,tab:'health',hWeek:1,dWeek:1,name:''},isDemo=false,isPro=false;
const $=id=>document.getElementById(id);
const qsa=(s,c)=>Array.from((c||document).querySelectorAll(s));
function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!==undefined)e.innerHTML=html;return e}
function toast(m,t='ok'){const e=$('toast');e.textContent=m;e.className='toast '+t+' show';setTimeout(()=>e.className='toast',2600)}

/* ===== ライセンス ===== */
function enterApp(mode){
  if(mode==='demo'){isDemo=true;isPro=false}else{isDemo=false;isPro=true}
  $('licScreen').style.display='none';$('app').style.display='flex';
  if(isDemo){$('demoBanner').style.display='block';$('wmOverlay').classList.add('show');$('modeBadge').className='badge demo-b';$('modeBadge').textContent='DEMO'}
  else{$('demoBanner').style.display='none';$('wmOverlay').classList.remove('show');$('modeBadge').className='badge pro';$('modeBadge').textContent='PRO'}
  initApp();
}
function activLic(){
  const key=$('licKey').value.trim(),err=$('licErr');
  if(!key){err.textContent='ライセンスキーを入力してください';return}
  err.textContent='';
  const h=hashKey(key);
  if(VALID_HASHES.includes(h)){
    localStorage.setItem(SK+'_lic',JSON.stringify({valid:true,key:h,mode:'pro'}));
    enterApp('pro');toast('アクティベート完了');
  } else {
    $('licBtn').disabled=true;$('licBtn').textContent='認証中...';
    fetch('https://api.polar.sh/v1/customer-portal/license-keys/validate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:key,organization_id:POLAR_ORG_ID})})
    .then(r=>{if(!r.ok)throw new Error('invalid');return r.json()}).then(data=>{
      if(data.status==='granted'){localStorage.setItem(SK+'_lic',JSON.stringify({valid:true,key:h,mode:'pro'}));enterApp('pro');toast('アクティベート完了')}
      else err.textContent='無効なキーです'
    }).catch(()=>err.textContent='無効なキーまたは接続エラー')
    .finally(()=>{$('licBtn').disabled=false;$('licBtn').textContent='アクティベート'});
  }
}

/* ===== データ層 ===== */
function sk(m){return 'hwl_'+(m||S.month)}
function load(m){try{return JSON.parse(localStorage.getItem(sk(m)))||{}}catch(e){return{}}}
function save(d,m){localStorage.setItem(sk(m||S.month),JSON.stringify(d));updFt()}
function getData(){return load()}
function setData(d){save(d)}
function getDay(type,day){const d=getData();if(!d[type])d[type]={};if(!d[type][day])d[type][day]={};return d[type][day]}
function setDay(type,day,val){const d=getData();if(!d[type])d[type]={};d[type][day]=val;setData(d)}
function setField(type,day,key,val){const dd=getDay(type,day);dd[key]=val;setDay(type,day,dd)}
function getCust(key){const d=getData();return(d._cust&&d._cust[key])||[]}
function addCust(key,v){v=v.trim();if(!v)return;const d=getData();if(!d._cust)d._cust={};if(!d._cust[key])d._cust[key]=[];if(!d._cust[key].includes(v)){d._cust[key].push(v);setData(d)}}
function rmCust(key,v){const d=getData();if(!d._cust||!d._cust[key])return;d._cust[key]=d._cust[key].filter(x=>x!==v);setData(d)}
function allOpts(key){return(DEFAULTS[key]?.it||[]).concat(getCust(key))}
function updFt(){const b=new Blob([localStorage.getItem(sk())||'']).size;$('ftK').textContent=(b/1024).toFixed(1)+' KB'}

/* ===== デモ制限チェック ===== */
function canEditDay(dayNum){
  if(!isDemo)return true;
  return dayNum<=DEMO_MAX_DAYS;
}

/* ===== 月/週 ===== */
function daysInMonth(ym){const p=ym.split('-');return new Date(+p[0],+p[1],0).getDate()}
function dow(ym,d){const p=ym.split('-');return WD[new Date(+p[0],+p[1]-1,d).getDay()]}
function getWeeks(ym){const t=daysInMonth(ym),w=[];for(let i=1;i<=t;i+=7)w.push({s:i,e:Math.min(i+6,t)});return w}
function initMonth(){
  const sel=$('globalMonth');sel.innerHTML='';const now=new Date();
  for(let m=-3;m<=12;m++){const dt=new Date(now.getFullYear(),now.getMonth()+m,1);const v=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');const o=document.createElement('option');o.value=v;o.textContent=dt.getFullYear()+'年'+(dt.getMonth()+1)+'月';sel.appendChild(o)}
  let cur=localStorage.getItem('hwl_curMonth');if(!cur)cur=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  sel.value=cur;S.month=cur;
  sel.addEventListener('change',function(){S.month=this.value;localStorage.setItem('hwl_curMonth',this.value);S.hWeek=1;S.dWeek=1;render()})
}
function initName(){const inp=$('userName');const saved=localStorage.getItem('hwl_name')||'';inp.value=saved;S.name=saved;inp.addEventListener('input',function(){S.name=this.value;localStorage.setItem('hwl_name',this.value)})}

/* ===== セレクタ ===== */
function bedOpts(){const a=[];for(let h=20;h<=28;h++)for(let m=0;m<60;m+=30){const hh=h%24;a.push(String(hh).padStart(2,'0')+':'+String(m).padStart(2,'0'))}return a}
function wakeOpts(){const a=[];for(let h=4;h<=12;h++)for(let m=0;m<60;m+=30)a.push(String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'));return a}
function schedTimeOpts(){const a=[];for(let h=8;h<=19;h++)for(let m=0;m<60;m+=30)a.push(String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'));return a}
function mkSel(opts,cur,onChange,disabled){const s=document.createElement('select');s.innerHTML='<option value="">--</option>';opts.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;if(v===cur)o.selected=true;s.appendChild(o)});if(disabled)s.disabled=true;s.addEventListener('change',()=>onChange(s.value));return s}

/* ===== ピル ===== */
function buildPills(container,optKey,curVal,onSelect,greenMode,disabled){
  container.innerHTML='';
  const defItems=DEFAULTS[optKey]?.it||[];const custItems=getCust(optKey);const cls=greenMode?'sel-g':'sel';
  function mkPill(v,isDef){
    const p=el('span','pill'+(isDef?' default':' cust')+(v===curVal?' '+cls:''));p.dataset.v=v;
    p.appendChild(el('span','',v));
    if(!isDef){const d2=el('span','pdel','×');d2.addEventListener('click',e=>{e.stopPropagation();rmCust(optKey,v);if(curVal===v)onSelect('');else buildPills(container,optKey,curVal===v?'':curVal,onSelect,greenMode,disabled)});p.appendChild(d2)}
    if(!disabled)p.addEventListener('click',()=>onSelect(v===curVal?'':v));
    else p.style.opacity='.5';
    container.appendChild(p)
  }
  defItems.forEach(v=>mkPill(v,true));custItems.forEach(v=>mkPill(v,false));
  if(!disabled){const ar=el('div','add-row');const inp=el('input');inp.type='text';inp.placeholder='カスタム追加...';const btn=el('button','','＋');btn.addEventListener('click',()=>{if(inp.value.trim()){addCust(optKey,inp.value.trim());inp.value='';render()}});inp.addEventListener('keydown',e=>{if(e.key==='Enter')btn.click()});ar.appendChild(inp);ar.appendChild(btn);container.appendChild(ar)}
}

/* ===== 統計 ===== */
function renderStats(){
  const data=getData(),total=daysInMonth(S.month);
  let hFilled=0;if(data.health){for(const d in data.health){const day=data.health[d];if(day.h_overall||day.h_temp||day.h_sleep)hFilled++}}
  $('hStats').innerHTML='';$('hStats').appendChild(el('div','stat-card','<strong>'+hFilled+'</strong> / '+total+' 日 記入済み'));
  if(data.health){let good=0;for(const d in data.health){const ov=data.health[d].h_overall||'';if(ov.includes('好調')||ov.includes('絶好調'))good++}if(good)$('hStats').appendChild(el('div','stat-card gn','<strong>'+good+'</strong> 日 好調'))}
  let dFilled=0;if(data.daily){for(const d in data.daily){const dd=data.daily[d];if(dd.d_health||(dd.scheds&&dd.scheds.length))dFilled++}}
  $('dStats').innerHTML='';$('dStats').appendChild(el('div','stat-card gn','<strong>'+dFilled+'</strong> / '+total+' 日 記入済み'))
}

/* ===== 週バー ===== */
function renderWeekBar(id,weeks,cur,onPick){
  const bar=$(id);bar.innerHTML='';const mo=parseInt(S.month.split('-')[1]);
  weeks.forEach((w,i)=>{const b=el('button','week-btn'+(i+1===cur?' active':''),'第'+(i+1)+'週 ('+mo+'/'+w.s+'〜'+mo+'/'+w.e+')');b.addEventListener('click',()=>onPick(i+1));bar.appendChild(b)})
}

/* ===== 健康チェック ===== */
function renderHealth(){
  const ym=S.month,weeks=getWeeks(ym);if(S.hWeek>weeks.length)S.hWeek=weeks.length;const w=weeks[S.hWeek-1];
  renderWeekBar('hWB',weeks,S.hWeek,n=>{S.hWeek=n;renderHealth()});
  const grid=$('hGrid');grid.innerHTML='';const mo=parseInt(ym.split('-')[1]);
  for(let day=w.s;day<=w.e;day++){(dy=>{
    const dk=''+dy,dd=getDay('health',dk),locked=!canEditDay(dy);
    const card=el('div','day-card');const hd=el('div','dc-hd hlt','<span><i class="fa-solid fa-calendar-day"></i> '+mo+'/'+dy+' ('+dow(ym,dy)+')</span>'+(locked?'<span style="font-size:10px;opacity:.6">🔒 製品版</span>':''));card.appendChild(hd);
    const bd=el('div','dc-bd');

    const f0=el('div','fld');f0.appendChild(el('div','fld-lb','<i class="fa-solid fa-bed"></i> 睡眠時間'));
    const tr=el('div','time-r');tr.appendChild(el('span','','就寝'));tr.appendChild(mkSel(bedOpts(),dd.bedTime||'',v=>setField('health',dk,'bedTime',v),locked));tr.appendChild(el('span','','→ 起床'));tr.appendChild(mkSel(wakeOpts(),dd.wakeTime||'',v=>setField('health',dk,'wakeTime',v),locked));f0.appendChild(tr);bd.appendChild(f0);
    // Pills
    HF.forEach(key=>{const f=el('div','fld');f.appendChild(el('div','fld-lb','<i class="fa-solid fa-circle-dot"></i> '+DEFAULTS[key].lb));const pg=el('div','pg');buildPills(pg,key,dd[key]||'',v=>{setField('health',dk,key,v);renderHealth()},false,locked);f.appendChild(pg);bd.appendChild(f)});
    // Memo
    const f1=el('div','fld');f1.appendChild(el('div','fld-lb','<i class="fa-solid fa-pen"></i> メモ・備考'));const ta=el('textarea','ti');ta.rows=2;ta.placeholder='自由に記入...';ta.value=dd.memo||'';if(locked)ta.disabled=true;ta.addEventListener('input',function(){setField('health',dk,'memo',this.value)});f1.appendChild(ta);bd.appendChild(f1);
    // Staff
    const f2=el('div','fld');f2.appendChild(el('div','fld-lb','<i class="fa-solid fa-user-check"></i> 確認者'));const si=el('input','ti');si.type='text';si.placeholder='確認者名';si.value=dd.staff||'';if(locked)si.disabled=true;si.addEventListener('input',function(){setField('health',dk,'staff',this.value)});f2.appendChild(si);bd.appendChild(f2);
    card.appendChild(bd);grid.appendChild(card)
  })(day)}
  renderStats()
}

/* ===== 業務日報 ===== */
function renderDaily(){
  const ym=S.month,weeks=getWeeks(ym);if(S.dWeek>weeks.length)S.dWeek=weeks.length;const w=weeks[S.dWeek-1];
  renderWeekBar('dWB',weeks,S.dWeek,n=>{S.dWeek=n;renderDaily()});
  const grid=$('dGrid');grid.innerHTML='';const mo=parseInt(ym.split('-')[1]);
  for(let day=w.s;day<=w.e;day++){(dy=>{
    const dk=''+dy,dd=getDay('daily',dk),locked=!canEditDay(dy);if(!dd.scheds)dd.scheds=[];
    const card=el('div','day-card');const hd=el('div','dc-hd dlt','<span><i class="fa-solid fa-calendar-day"></i> '+mo+'/'+dy+' ('+dow(ym,dy)+') 業務日報</span>'+(locked?'<span style="font-size:10px;opacity:.6">🔒 製品版</span>':''));card.appendChild(hd);
    const bd=el('div','dc-bd');
    // Health
    const fH=el('div','fld');fH.appendChild(el('div','fld-lb','<i class="fa-solid fa-heart-pulse"></i> 体調'));const pgH=el('div','pg');buildPills(pgH,'d_health',dd.d_health||'',v=>{setField('daily',dk,'d_health',v);renderDaily()},true,locked);fH.appendChild(pgH);bd.appendChild(fH);
    // Schedule
    const fS=el('div','fld');fS.appendChild(el('div','fld-lb','<i class="fa-solid fa-clock"></i> スケジュール'));const sc=el('div','');
    const cur=getDay('daily',dk);if(!cur.scheds)cur.scheds=[];
    cur.scheds.forEach((sch,idx)=>{((index)=>{
      const sb2=el('div','sb');const top=el('div','sb-top');
      top.appendChild(mkSel(schedTimeOpts(),sch.start||'',v=>{const d2=getDay('daily',dk);d2.scheds[index].start=v;setDay('daily',dk,d2)},locked));
      top.appendChild(el('span','','〜'));
      top.appendChild(mkSel(schedTimeOpts(),sch.end||'',v=>{const d2=getDay('daily',dk);d2.scheds[index].end=v;setDay('daily',dk,d2)},locked));
      top.appendChild(mkSel(allOpts('d_prog'),sch.prog||'',v=>{const d2=getDay('daily',dk);d2.scheds[index].prog=v;setDay('daily',dk,d2)},locked));
      top.appendChild(mkSel(allOpts('d_equip'),sch.equip||'',v=>{const d2=getDay('daily',dk);d2.scheds[index].equip=v;setDay('daily',dk,d2)},locked));
      if(!locked){const rm=el('button','btn-rm','×');rm.addEventListener('click',()=>{const d2=getDay('daily',dk);d2.scheds.splice(index,1);setDay('daily',dk,d2);renderDaily()});top.appendChild(rm)}
      sb2.appendChild(top);
      const cmtTa=el('textarea','ti');cmtTa.rows=1;cmtTa.placeholder='進捗・コメント';cmtTa.value=sch.comment||'';if(locked)cmtTa.disabled=true;cmtTa.addEventListener('input',function(){const d2=getDay('daily',dk);d2.scheds[index].comment=this.value;setDay('daily',dk,d2)});sb2.appendChild(cmtTa);sc.appendChild(sb2)
    })(idx)});
    if(!locked){const addBtn=el('button','btn-add-s','<i class="fa-solid fa-plus"></i> 時間枠を追加');addBtn.addEventListener('click',()=>{const d2=getDay('daily',dk);if(!d2.scheds)d2.scheds=[];d2.scheds.push({start:'',end:'',prog:'',equip:'',comment:''});setDay('daily',dk,d2);renderDaily()});sc.appendChild(addBtn)}
    fS.appendChild(sc);bd.appendChild(fS);
    // Lunch & Amount
    [['d_lunch','🍱 昼食'],['d_amount','🍽️ 食事量']].forEach(([k,lb])=>{const f=el('div','fld');f.appendChild(el('div','fld-lb',lb));const pg=el('div','pg');buildPills(pg,k,dd[k]||'',v=>{setField('daily',dk,k,v);renderDaily()},true,locked);f.appendChild(pg);bd.appendChild(f)});
    // Text fields
    [['goal','🎯 本日の目標'],['goalResult','📊 成果'],['freeComment','💬 フリーコメント']].forEach(([k,lb])=>{const f=el('div','fld');f.appendChild(el('div','fld-lb',lb));const ta=el('textarea','ti');ta.rows=2;ta.placeholder='入力...';ta.value=dd[k]||'';if(locked)ta.disabled=true;ta.addEventListener('input',function(){setField('daily',dk,k,this.value)});f.appendChild(ta);bd.appendChild(f)});
    card.appendChild(bd);grid.appendChild(card)
  })(day)}
  renderStats()
}

/* ===== ダッシュボード ===== */
function renderDash(){
  const data=getData(),total=daysInMonth(S.month),v=$('dashView');
  let hFilled=0,dFilled=0,goodDays=0,badDays=0;
  const overallCount={},bodyCount={},mentalCount={};
  if(data.health){for(const d in data.health){const day=data.health[d];if(day.h_overall||day.h_temp)hFilled++;const ov=day.h_overall||'';if(ov)overallCount[ov]=(overallCount[ov]||0)+1;if(ov.includes('好調')||ov.includes('絶好調'))goodDays++;if(ov.includes('良くない'))badDays++;const bo=day.h_body||'';if(bo)bodyCount[bo]=(bodyCount[bo]||0)+1;const me=day.h_mental||'';if(me)mentalCount[me]=(mentalCount[me]||0)+1}}
  if(data.daily){for(const d in data.daily){const dd=data.daily[d];if(dd.d_health||(dd.scheds&&dd.scheds.length))dFilled++}}
  const hRate=total?Math.round(hFilled/total*100):0;const dRate=total?Math.round(dFilled/total*100):0;
  let h=`<div class="dash-title"><i class="fa-solid fa-chart-line"></i> 月間ダッシュボード — ${S.month.replace('-','年')}月</div>`;
  h+=`<div class="dash-cards"><div class="dcard"><div class="dv">${hRate}%</div><div class="dl">健康チェック記入率</div></div><div class="dcard"><div class="dv">${dRate}%</div><div class="dl">業務日報記入率</div></div><div class="dcard"><div class="dv">${goodDays}</div><div class="dl">好調日数</div></div><div class="dcard"><div class="dv">${badDays}</div><div class="dl">不調日数</div></div></div>`;
  // Overall distribution
  if(Object.keys(overallCount).length){const mx=Math.max(...Object.values(overallCount),1);h+=`<div class="dash-section"><h3><i class="fa-solid fa-chart-bar"></i> 総合評価 分布</h3>`;Object.entries(overallCount).sort((a,b)=>b[1]-a[1]).forEach(([k,v2])=>{const p=Math.round(v2/mx*100);h+=`<div class="chart-bar"><span class="cbl">${k}</span><div class="cbr"><div class="cbf" style="width:${p}%;background:linear-gradient(90deg,var(--accent),var(--green))"></div><span class="cbn">${v2}日</span></div></div>`});h+=`</div>`}
  // Body & Mental
  [['身体の調子',bodyCount],['朝の気分',mentalCount]].forEach(([title,obj])=>{if(Object.keys(obj).length){const mx=Math.max(...Object.values(obj),1);h+=`<div class="dash-section"><h3><i class="fa-solid fa-heart"></i> ${title}</h3>`;Object.entries(obj).sort((a,b)=>b[1]-a[1]).forEach(([k,v2])=>{const p=Math.round(v2/mx*100);h+=`<div class="chart-bar"><span class="cbl">${k}</span><div class="cbr"><div class="cbf" style="width:${p}%;background:linear-gradient(90deg,var(--green),#34d399)"></div><span class="cbn">${v2}日</span></div></div>`});h+=`</div>`}});
  // Monthly report
  h+=`<div class="dash-section"><h3><i class="fa-solid fa-file-lines"></i> 月次サマリーレポート</h3><button class="hbtn" style="margin-bottom:10px" id="genReport"><i class="fa-solid fa-wand-magic-sparkles"></i> レポート生成</button><div class="report-box" id="reportBox" style="display:none"></div></div>`;
  v.innerHTML=h;
  $('genReport')?.addEventListener('click',genMonthlyReport);
}

function genMonthlyReport(){
  if(isDemo){toast('レポート生成は製品版のみ','warn');return}
  const box=$('reportBox');box.style.display='block';
  const data=getData(),total=daysInMonth(S.month),ym=S.month.split('-');
  let r=`===== 月次サマリーレポート =====\n対象: ${ym[0]}年${parseInt(ym[1])}月\nユーザー: ${S.name||'—'}\n\n`;
  let hF=0,good=0,bad=0;
  if(data.health){for(const d in data.health){const day=data.health[d];if(day.h_overall||day.h_temp)hF++;const ov=day.h_overall||'';if(ov.includes('好調')||ov.includes('絶好調'))good++;if(ov.includes('良くない'))bad++}}
  let dF=0,goalCount=0,resultCount=0;
  if(data.daily){for(const d in data.daily){const dd=data.daily[d];if(dd.d_health||(dd.scheds&&dd.scheds.length))dF++;if(dd.goal)goalCount++;if(dd.goalResult)resultCount++}}
  r+=`【健康チェック】\n  記入率: ${hF}/${total}日 (${total?Math.round(hF/total*100):0}%)\n  好調日: ${good}日\n  不調日: ${bad}日\n\n`;
  r+=`【業務日報】\n  記入率: ${dF}/${total}日 (${total?Math.round(dF/total*100):0}%)\n  目標設定: ${goalCount}日\n  成果記入: ${resultCount}日\n\n`;
  if(data.health){const stressCount=Object.values(data.health).filter(d=>d.h_stress==='あり').length;r+=`【注意事項】\n  ストレス申告日: ${stressCount}日\n`}
  box.textContent=r;
}

/* ===== レンダリング ===== */
function render(){
  if(S.tab==='health')renderHealth();
  else if(S.tab==='daily')renderDaily();
  else if(S.tab==='dash')renderDash();
}

/* ===== タブ ===== */
qsa('.tab-btn').forEach(b=>b.addEventListener('click',function(){
  qsa('.tab-btn').forEach(x=>x.classList.remove('active'));this.classList.add('active');
  S.tab=this.dataset.tab;
  qsa('.tab-page').forEach(p=>p.classList.remove('active'));
  $('page-'+S.tab).classList.add('active');
  render()
}));

/* ===== 印刷 ===== */
function doPrint(){
  if(isDemo){toast('PDF出力は製品版のみ','warn');return}
  const ym=S.month.split('-'),mo=parseInt(ym[1]),weeks=getWeeks(S.month);
  const wn=S.tab==='health'?S.hWeek:S.dWeek;const w=weeks[wn-1];
  const ptId=S.tab==='health'?'hPT':'dPT';const tabLabel=S.tab==='health'?'健康チェック':'業務日報';
  $(ptId).textContent=`${tabLabel} ${ym[0]}年${mo}月 第${wn}週 (${mo}/${w.s}〜${mo}/${w.e}) — ${S.name||'ユーザー'}`;
  qsa('.tab-page').forEach(p=>p.classList.remove('printing'));
  $('page-'+S.tab).classList.add('printing');
  const orig=document.title;document.title=`${tabLabel}_${ym[0]}年${mo}月_第${wn}週_${S.name||''}`;
  setTimeout(()=>{window.print();document.title=orig;$('page-'+S.tab).classList.remove('printing')},300)
}

/* ===== リセット＆バックアップ ===== */
function confirmReset(){const ym=S.month.split('-');$('rstMsg').innerHTML=`<strong>${ym[0]}年${parseInt(ym[1])}月</strong>のデータをすべてリセットします。<br>リセット前に自動バックアップが作成されます。<br><br>本当にリセットしますか？`;$('moReset').classList.add('show')}
function execReset(){$('moReset').classList.remove('show');const data=getData();const bKey='hwl_bk_'+S.month+'_'+Date.now();localStorage.setItem(bKey,JSON.stringify({month:S.month,date:new Date().toISOString(),data}));localStorage.removeItem(sk());toast('バックアップ完了 → リセットしました');render()}
function viewBackups(){
  const list=$('bkList');list.innerHTML='';const keys=[];
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith('hwl_bk_'))keys.push(k)}
  keys.sort().reverse();
  if(!keys.length){list.innerHTML='<p style="color:var(--sub);font-size:13px;padding:16px 0;text-align:center">バックアップはまだありません。</p>'}
  else keys.forEach(k=>{let obj;try{obj=JSON.parse(localStorage.getItem(k))}catch(e){return}
    const div=el('div','bk-item');const dt=new Date(obj.date);div.innerHTML=`<div><strong>${obj.month}</strong> — ${dt.toLocaleString('ja-JP')}</div><div></div>`;const btns=div.lastElementChild;
    const bR=el('button','bk-restore','復元');bR.addEventListener('click',()=>{if(!confirm(obj.month+'のデータを復元しますか？'))return;save(obj.data,obj.month);S.month=obj.month;$('globalMonth').value=obj.month;localStorage.setItem('hwl_curMonth',obj.month);$('moBackup').classList.remove('show');render();toast('復元しました')});btns.appendChild(bR);
    const bD=el('button','bk-dl','JSON');bD.addEventListener('click',()=>{const blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='backup_'+obj.month+'_'+Date.now()+'.json';a.click()});btns.appendChild(bD);
    const bDel=el('button','bk-del','削除');bDel.addEventListener('click',()=>{if(!confirm('削除しますか？'))return;localStorage.removeItem(k);viewBackups();toast('削除しました','warn')});btns.appendChild(bDel);
    list.appendChild(div)});
  $('moBackup').classList.add('show')
}

/* ===== イベント ===== */
$('licBtn').onclick=activLic;$('licKey').onkeydown=e=>{if(e.key==='Enter')activLic()};
$('demoBtn').onclick=()=>enterApp('demo');
$('printBtn').onclick=doPrint;
$('dashBtn').onclick=()=>{qsa('.tab-btn').forEach(x=>x.classList.remove('active'));qsa('.tab-btn').forEach(x=>{if(x.dataset.tab==='dash')x.classList.add('active')});S.tab='dash';qsa('.tab-page').forEach(p=>p.classList.remove('active'));$('page-dash').classList.add('active');render()};
$('bkBtn').onclick=viewBackups;
$('rstBtn').onclick=confirmReset;
$('rstNo').onclick=()=>$('moReset').classList.remove('show');
$('rstYes').onclick=execReset;
$('bkClose').onclick=()=>$('moBackup').classList.remove('show');
$('moReset').onclick=e=>{if(e.target===$('moReset'))$('moReset').classList.remove('show')};
$('moBackup').onclick=e=>{if(e.target===$('moBackup'))$('moBackup').classList.remove('show')};

/* ===== 起動 ===== */
function initApp(){initName();initMonth();render();updFt()}
function boot(){
  const saved=localStorage.getItem(SK+'_lic');
  if(saved){try{const d=JSON.parse(saved);if(d.valid){enterApp(d.mode||'pro');return}}catch(e){}}
  $('licScreen').style.display='flex';$('app').style.display='none'
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);else boot();
})();
</script>
</body>
