<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Generator — 請求書自動作成ツール</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ========== RESET & BASE ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  font-family: "Noto Sans JP", "Helvetica Neue", "Hiragino Kaku Gothic ProN", sans-serif;
  background: #f0f4f8; color: #1e293b; line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

/* ========== HEADER ========== */
.app-header {
  background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
  color: #fff; padding: 18px 28px; display: flex; align-items: center; gap: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.25);
}
.app-header .logo {
  width: 46px; height: 46px; background: #2563eb; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 700; flex-shrink: 0;
}
.app-header h1 { font-size: 1.3rem; font-weight: 700; }
.app-header .sub { font-size: 0.78rem; opacity: 0.7; margin-top: 2px; }

/* ========== LAYOUT ========== */
.container {
  display: grid; grid-template-columns: 440px 1fr;
  gap: 28px; padding: 28px; max-width: 1440px; margin: 0 auto;
}
@media (max-width: 960px) {
  .container { grid-template-columns: 1fr; }
}

/* ========== FORM PANEL ========== */
.form-panel {
  background: #fff; border-radius: 14px; padding: 28px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  max-height: calc(100vh - 120px); overflow-y: auto;
}
.form-panel::-webkit-scrollbar { width: 6px; }
.form-panel::-webkit-scrollbar-track { background: transparent; }
.form-panel::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

.section-title {
  font-size: 0.95rem; font-weight: 700; color: #2563eb; margin-bottom: 16px;
  padding-bottom: 10px; border-bottom: 2px solid #dbeafe;
  display: flex; align-items: center; gap: 8px;
}
.section-title .icon { font-size: 1.1rem; }

.form-group { margin-bottom: 16px; }
.form-group label {
  display: block; font-size: 0.8rem; font-weight: 600;
  color: #475569; margin-bottom: 5px; letter-spacing: 0.02em;
}
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 10px 14px; border: 1.5px solid #e2e8f0;
  border-radius: 8px; font-size: 0.88rem; font-family: inherit;
  transition: border 0.2s, box-shadow 0.2s; background: #fafbfc;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus {
  outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
  background: #fff;
}
.form-group input::placeholder, .form-group textarea::placeholder {
  color: #94a3b8;
}
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.row3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 12px; }

/* ========== SAVE / LOAD BUTTONS ========== */
.save-load-bar {
  display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap;
}
.btn-sm {
  padding: 7px 14px; font-size: 0.78rem; font-weight: 600; border-radius: 7px;
  cursor: pointer; transition: all 0.2s; border: 1.5px solid transparent;
  font-family: inherit;
}
.btn-save-issuer {
  background: #ecfdf5; color: #059669; border-color: #a7f3d0;
}
.btn-save-issuer:hover { background: #d1fae5; }
.btn-load-issuer {
  background: #f0fdf4; color: #16a34a; border-color: #bbf7d0;
}
.btn-load-issuer:hover { background: #dcfce7; }
.btn-save-template {
  background: #eff6ff; color: #2563eb; border-color: #bfdbfe;
}
.btn-save-template:hover { background: #dbeafe; }
.btn-load-template {
  background: #f0f9ff; color: #0284c7; border-color: #bae6fd;
}
.btn-load-template:hover { background: #e0f2fe; }

/* ========== ITEM TABLE ========== */
.items-header {
  display: flex; justify-content: space-between; align-items: center;
  margin: 20px 0 12px;
}
.items-header .section-title { margin: 0; border: none; padding: 0; }
.btn-add {
  background: #2563eb; color: #fff; border: none; border-radius: 7px;
  padding: 7px 16px; font-size: 0.8rem; cursor: pointer; font-weight: 600;
  font-family: inherit; transition: background 0.2s, transform 0.15s;
}
.btn-add:hover { background: #1d4ed8; transform: translateY(-1px); }
.item-row {
  background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 10px;
  padding: 14px; margin-bottom: 10px; position: relative;
  transition: border-color 0.2s;
}
.item-row:hover { border-color: #cbd5e1; }
.item-row .row-items { display: grid; grid-template-columns: 3fr 1fr 1fr 1.2fr; gap: 10px; }
.btn-del {
  position: absolute; top: 10px; right: 10px; background: #fee2e2; color: #dc2626;
  border: none; border-radius: 6px; width: 26px; height: 26px; cursor: pointer;
  font-size: 14px; display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.15s;
}
.btn-del:hover { background: #fecaca; transform: scale(1.1); }
.item-subtotal {
  text-align: right; font-size: 0.8rem; color: #64748b; margin-top: 6px;
  font-weight: 500;
}

/* ========== TOTALS ========== */
.totals {
  background: linear-gradient(135deg, #f0f9ff, #eff6ff);
  border: 1.5px solid #bae6fd; border-radius: 10px;
  padding: 16px; margin-top: 18px;
}
.total-row {
  display: flex; justify-content: space-between; padding: 5px 0;
  font-size: 0.9rem;
}
.total-row.grand {
  font-size: 1.15rem; font-weight: 800; color: #2563eb;
  border-top: 2px solid #2563eb; margin-top: 8px; padding-top: 10px;
}

/* ========== WATERMARK TOGGLE ========== */
.watermark-toggle {
  display: flex; align-items: center; gap: 10px; margin-top: 14px;
  padding: 12px 14px; background: #fffbeb; border: 1.5px solid #fde68a;
  border-radius: 8px; font-size: 0.8rem; color: #92400e;
}
.watermark-toggle input[type="checkbox"] {
  width: 18px; height: 18px; accent-color: #f59e0b; cursor: pointer;
  flex-shrink: 0;
}
.watermark-toggle label { cursor: pointer; font-weight: 500; }

/* ========== BUTTONS ========== */
.actions {
  display: flex; gap: 10px; margin-top: 20px;
}
.btn-pdf {
  flex: 1; background: linear-gradient(135deg, #2563eb, #1d4ed8); color: #fff;
  border: none; border-radius: 10px; padding: 14px; font-size: 1rem;
  font-weight: 700; cursor: pointer; font-family: inherit;
  transition: transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 2px 8px rgba(37,99,235,0.3);
}
.btn-pdf:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(37,99,235,0.4); }
.btn-clear {
  background: #fff; color: #dc2626; border: 2px solid #fecaca; border-radius: 10px;
  padding: 14px 22px; font-size: 0.9rem; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: background 0.2s;
}
.btn-clear:hover { background: #fee2e2; }

/* ========== PREVIEW ========== */
.preview-panel {
  background: #fff; border-radius: 14px; padding: 28px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  max-height: calc(100vh - 120px); overflow-y: auto;
}
.preview-panel::-webkit-scrollbar { width: 6px; }
.preview-panel::-webkit-scrollbar-track { background: transparent; }
.preview-panel::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

.preview-label {
  font-size: 0.8rem; color: #64748b; text-align: center;
  margin-bottom: 18px; font-weight: 600; letter-spacing: 0.03em;
}

/* ========== INVOICE (PREVIEW & PRINT) ========== */
.invoice {
  max-width: 700px; margin: 0 auto; padding: 44px;
  border: 1px solid #e2e8f0; border-radius: 4px; background: #fff;
  font-family: "Noto Sans JP", sans-serif;
}
.inv-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px; }
.inv-title { font-size: 1.8rem; font-weight: 800; color: #0f172a; letter-spacing: 3px; }
.inv-number { font-size: 0.85rem; color: #64748b; margin-top: 4px; }
.inv-registration { font-size: 0.8rem; color: #475569; margin-top: 2px; }
.inv-date { text-align: right; font-size: 0.85rem; color: #64748b; line-height: 1.8; }
.inv-parties { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-bottom: 30px; }
.inv-party h3 {
  font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1.5px;
  color: #94a3b8; margin-bottom: 8px; font-weight: 600;
}
.inv-party .name { font-size: 1.05rem; font-weight: 700; color: #0f172a; }
.inv-party .detail { font-size: 0.82rem; color: #475569; line-height: 1.6; margin-top: 2px; }
.inv-table { width: 100%; border-collapse: collapse; margin-bottom: 22px; }
.inv-table th {
  background: #0f172a; color: #fff; padding: 10px 14px;
  font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px;
  text-align: left; font-weight: 600;
}
.inv-table th:nth-child(2), .inv-table th:nth-child(3),
.inv-table th:nth-child(4), .inv-table th:nth-child(5) { text-align: right; }
.inv-table td { padding: 10px 14px; border-bottom: 1px solid #e2e8f0; font-size: 0.86rem; }
.inv-table td:nth-child(2), .inv-table td:nth-child(3),
.inv-table td:nth-child(4), .inv-table td:nth-child(5) { text-align: right; }
.inv-table tbody tr:hover { background: #f8fafc; }
.inv-table .tax-mark { font-size: 0.72rem; color: #64748b; margin-left: 2px; }
.inv-totals { display: flex; justify-content: flex-end; }
.inv-totals-box { width: 280px; }
.inv-total-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 0.88rem; }
.inv-total-row.grand {
  font-size: 1.15rem; font-weight: 800; color: #2563eb;
  border-top: 2px solid #0f172a; padding-top: 10px; margin-top: 6px;
}
.inv-notes { margin-top: 32px; padding-top: 18px; border-top: 1px solid #e2e8f0; }
.inv-notes h4 { font-size: 0.75rem; text-transform: uppercase; color: #94a3b8; letter-spacing: 1px; margin-bottom: 6px; font-weight: 600; }
.inv-notes p { font-size: 0.82rem; color: #64748b; white-space: pre-wrap; }
.inv-footer {
  margin-top: 32px; text-align: center; font-size: 0.72rem; color: #b0b8c4;
  padding-top: 14px; border-top: 1px solid #e2e8f0;
}
.inv-footer.hidden { display: none; }

/* ========== PRINT ========== */
@media print {
  body { background: #fff; }
  .app-header, .form-panel, .preview-label, .actions { display: none !important; }
  .container { display: block; padding: 0; }
  .preview-panel { box-shadow: none; padding: 0; max-height: none; overflow: visible; border-radius: 0; }
  .invoice { border: none; padding: 20px; max-width: 100%; }
}

/* ========== TOAST ========== */
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(10px);
  background: #0f172a; color: #fff; padding: 12px 28px; border-radius: 10px;
  font-size: 0.88rem; font-weight: 500; opacity: 0;
  transition: opacity 0.3s, transform 0.3s; pointer-events: none; z-index: 999;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header class="app-header">
  <div class="logo">¥</div>
  <div>
    <h1>Invoice Generator</h1>
    <div class="sub">請求書自動作成ツール — インボイス制度対応</div>
  </div>
</header>

<div class="container">
  <!-- ===== LEFT: FORM ===== -->
  <div class="form-panel">

    <!-- Save / Load Bar -->
    <div class="save-load-bar">
      <button class="btn-sm btn-save-issuer" onclick="saveIssuer()" title="自社情報をブラウザに保存">💾 自社情報を保存</button>
      <button class="btn-sm btn-load-issuer" onclick="loadIssuer()" title="保存済みの自社情報を読込">📂 自社情報を読込</button>
      <button class="btn-sm btn-save-template" onclick="saveTemplate()" title="現在の入力をテンプレートとして保存">📋 テンプレ保存</button>
      <button class="btn-sm btn-load-template" onclick="loadTemplate()" title="保存済みテンプレートを復元">📄 テンプレ復元</button>
    </div>

    <div class="section-title"><span class="icon">📄</span> 基本情報</div>
    <div class="row2">
      <div class="form-group">
        <label>請求書番号</label>
        <input type="text" id="invNumber" placeholder="INV-001">
      </div>
      <div class="form-group">
        <label>請求日</label>
        <input type="date" id="invDate">
      </div>
    </div>
    <div class="form-group">
      <label>支払期限</label>
      <input type="date" id="invDue">
    </div>

    <div class="section-title" style="margin-top:22px;"><span class="icon">🏢</span> 請求先（お客様）</div>
    <div class="form-group">
      <label>会社名 / 氏名</label>
      <input type="text" id="clientName" placeholder="株式会社〇〇">
    </div>
    <div class="form-group">
      <label>住所</label>
      <input type="text" id="clientAddr" placeholder="東京都渋谷区...">
    </div>
    <div class="form-group">
      <label>メール / 電話</label>
      <input type="text" id="clientContact" placeholder="info@example.com">
    </div>

    <div class="section-title" style="margin-top:22px;"><span class="icon">👤</span> 自社情報（発行者）</div>
    <div class="form-group">
      <label>会社名 / 氏名</label>
      <input type="text" id="myName" placeholder="フリーランス 山田太郎">
    </div>
    <div class="form-group">
      <label>住所</label>
      <input type="text" id="myAddr" placeholder="大阪府大阪市...">
    </div>
    <div class="form-group">
      <label>適格請求書発行事業者番号</label>
      <input type="text" id="invoiceReg" placeholder="T1234567890123" maxlength="14">
    </div>
    <div class="form-group">
      <label>メール / 電話 / 振込先</label>
      <textarea id="myContact" rows="3" placeholder="mail@example.com&#10;〇〇銀行 △△支店 普通 1234567"></textarea>
    </div>

    <!-- Items -->
    <div class="items-header">
      <div class="section-title"><span class="icon">📦</span> 品目・明細</div>
      <button class="btn-add" onclick="addItem()">＋ 行を追加</button>
    </div>
    <div id="itemList"></div>

    <!-- Notes -->
    <div class="form-group" style="margin-top:16px;">
      <label>備考</label>
      <textarea id="notes" rows="3" placeholder="お支払い方法やその他連絡事項"></textarea>
    </div>

    <!-- Watermark Toggle -->
    <div class="watermark-toggle">
      <input type="checkbox" id="showWatermark" checked>
      <label for="showWatermark">フッターに「Invoice Generator で作成」を表示する（無料版）</label>
    </div>

    <!-- Buttons -->
    <div class="actions">
      <button class="btn-pdf" onclick="printInvoice()">🖨️ PDF出力 / 印刷</button>
      <button class="btn-clear" onclick="clearAll()">🗑️ クリア</button>
    </div>
  </div>

  <!-- ===== RIGHT: PREVIEW ===== -->
  <div class="preview-panel">
    <div class="preview-label">▼ リアルタイムプレビュー（入力すると自動更新されます）</div>
    <div class="invoice" id="invoicePreview"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  "use strict";

  /* ---------- STATE ---------- */
  var items = [];
  var itemId = 0;

  /* ---------- INIT ---------- */
  function init() {
    var today = new Date().toISOString().slice(0, 10);
    document.getElementById("invDate").value = today;
    var due = new Date();
    due.setDate(due.getDate() + 30);
    document.getElementById("invDue").value = due.toISOString().slice(0, 10);

    addItem();
    addItem();

    document.querySelector(".form-panel").addEventListener("input", render);
    document.getElementById("showWatermark").addEventListener("change", render);
    render();
  }

  /* ---------- ITEMS ---------- */
  window.addItem = function () {
    items.push({ id: ++itemId, name: "", qty: 1, price: 0, taxRate: 10 });
    renderItems();
    render();
  };

  window.removeItem = function (id) {
    items = items.filter(function (i) { return i.id !== id; });
    if (items.length === 0) addItem();
    renderItems();
    render();
  };

  function renderItems() {
    var box = document.getElementById("itemList");
    box.innerHTML = items.map(function (it) {
      return '<div class="item-row" data-id="' + it.id + '">' +
        '<button class="btn-del" onclick="removeItem(' + it.id + ')" title="この行を削除">×</button>' +
        '<div class="row-items">' +
          '<div class="form-group"><label>品目</label>' +
          '<input type="text" class="it-name" value="' + esc(it.name) + '" placeholder="Webサイト制作"></div>' +
          '<div class="form-group"><label>数量</label>' +
          '<input type="number" class="it-qty" value="' + it.qty + '" min="0"></div>' +
          '<div class="form-group"><label>単価（¥）</label>' +
          '<input type="number" class="it-price" value="' + it.price + '" min="0"></div>' +
          '<div class="form-group"><label>税率</label>' +
          '<select class="it-tax">' +
            '<option value="10"' + (it.taxRate === 10 ? ' selected' : '') + '>10%</option>' +
            '<option value="8"' + (it.taxRate === 8 ? ' selected' : '') + '>8%（軽減）</option>' +
            '<option value="0"' + (it.taxRate === 0 ? ' selected' : '') + '>非課税</option>' +
          '</select></div>' +
        '</div>' +
        '<div class="item-subtotal">小計: ¥' + num(it.qty * it.price) + '（税: ¥' + num(Math.floor(it.qty * it.price * it.taxRate / 100)) + '）</div>' +
      '</div>';
    }).join("");

    box.querySelectorAll(".item-row").forEach(function (row) {
      var id = parseInt(row.dataset.id);
      var it = items.find(function (i) { return i.id === id; });
      row.querySelector(".it-name").addEventListener("input", function (e) { it.name = e.target.value; render(); });
      row.querySelector(".it-qty").addEventListener("input", function (e) { it.qty = parseFloat(e.target.value) || 0; updateSubtotal(row, it); render(); });
      row.querySelector(".it-price").addEventListener("input", function (e) { it.price = parseFloat(e.target.value) || 0; updateSubtotal(row, it); render(); });
      row.querySelector(".it-tax").addEventListener("change", function (e) { it.taxRate = parseInt(e.target.value); updateSubtotal(row, it); render(); });
    });
  }

  function updateSubtotal(row, it) {
    var sub = it.qty * it.price;
    var tax = Math.floor(sub * it.taxRate / 100);
    row.querySelector(".item-subtotal").textContent = "小計: ¥" + num(sub) + "（税: ¥" + num(tax) + "）";
  }

  /* ---------- RENDER PREVIEW ---------- */
  function render() {
    var v = getValues();
    var subtotal = 0;
    var tax10base = 0, tax8base = 0;

    items.forEach(function (it) {
      var lineTotal = it.qty * it.price;
      subtotal += lineTotal;
      if (it.taxRate === 10) tax10base += lineTotal;
      else if (it.taxRate === 8) tax8base += lineTotal;
    });

    var tax10 = Math.floor(tax10base * 0.10);
    var tax8 = Math.floor(tax8base * 0.08);
    var taxTotal = tax10 + tax8;
    var total = subtotal + taxTotal;
    var showWatermark = document.getElementById("showWatermark").checked;

    var html =
      '<div class="inv-header">' +
        '<div>' +
          '<div class="inv-title">請 求 書</div>' +
          '<div class="inv-number">No. ' + esc(v.invNumber || "—") + '</div>' +
          (v.invoiceReg ? '<div class="inv-registration">登録番号: ' + esc(v.invoiceReg) + '</div>' : '') +
        '</div>' +
        '<div class="inv-date">請求日: ' + formatDate(v.invDate) + '<br>支払期限: ' + formatDate(v.invDue) + '</div>' +
      '</div>' +

      '<div class="inv-parties">' +
        '<div class="inv-party">' +
          '<h3>請求先</h3>' +
          '<div class="name">' + esc(v.clientName || "—") + ' 御中</div>' +
          '<div class="detail">' + esc(v.clientAddr) + (v.clientContact ? '<br>' + esc(v.clientContact) : '') + '</div>' +
        '</div>' +
        '<div class="inv-party">' +
          '<h3>発行者</h3>' +
          '<div class="name">' + esc(v.myName || "—") + '</div>' +
          '<div class="detail">' + esc(v.myAddr) + (v.myContact ? '<br>' + nlToBr(esc(v.myContact)) : '') + '</div>' +
        '</div>' +
      '</div>' +

      '<table class="inv-table"><thead><tr>' +
        '<th>品目</th><th>数量</th><th>単価</th><th>税率</th><th>金額</th>' +
      '</tr></thead><tbody>';

    items.forEach(function (it) {
      var lineTotal = it.qty * it.price;
      var taxLabel = it.taxRate === 10 ? '10%' : it.taxRate === 8 ? '8%※' : '非課税';
      html += '<tr><td>' + esc(it.name || "—") + '</td>' +
        '<td>' + it.qty + '</td>' +
        '<td>¥' + num(it.price) + '</td>' +
        '<td>' + taxLabel + '</td>' +
        '<td>¥' + num(lineTotal) + '</td></tr>';
    });

    html += '</tbody></table>';

    // 軽減税率の注記
    if (tax8base > 0) {
      html += '<div style="font-size:0.75rem;color:#64748b;margin-bottom:12px;">※ 軽減税率（8%）対象品目</div>';
    }

    html +=
      '<div class="inv-totals"><div class="inv-totals-box">' +
        '<div class="inv-total-row"><span>小計</span><span>¥' + num(subtotal) + '</span></div>';

    if (tax10base > 0) {
      html += '<div class="inv-total-row"><span>消費税（10%対象: ¥' + num(tax10base) + '）</span><span>¥' + num(tax10) + '</span></div>';
    }
    if (tax8base > 0) {
      html += '<div class="inv-total-row"><span>消費税（8%対象: ¥' + num(tax8base) + '）</span><span>¥' + num(tax8) + '</span></div>';
    }
    if (tax10base === 0 && tax8base === 0) {
      html += '<div class="inv-total-row"><span>消費税</span><span>¥0</span></div>';
    }

    html +=
        '<div class="inv-total-row grand"><span>合計</span><span>¥' + num(total) + '</span></div>' +
      '</div></div>';

    if (v.notes.trim()) {
      html += '<div class="inv-notes"><h4>備考</h4><p>' + esc(v.notes) + '</p></div>';
    }

    if (showWatermark) {
      html += '<div class="inv-footer">この請求書は Invoice Generator で作成されました</div>';
    }

    document.getElementById("invoicePreview").innerHTML = html;
  }

  /* ---------- GET FORM VALUES ---------- */
  function getValues() {
    return {
      invNumber:     document.getElementById("invNumber").value,
      invDate:       document.getElementById("invDate").value,
      invDue:        document.getElementById("invDue").value,
      clientName:    document.getElementById("clientName").value,
      clientAddr:    document.getElementById("clientAddr").value,
      clientContact: document.getElementById("clientContact").value,
      myName:        document.getElementById("myName").value,
      myAddr:        document.getElementById("myAddr").value,
      invoiceReg:    document.getElementById("invoiceReg").value,
      myContact:     document.getElementById("myContact").value,
      notes:         document.getElementById("notes").value,
    };
  }

  /* ---------- SAVE / LOAD ISSUER ---------- */
  window.saveIssuer = function () {
    var data = {
      myName:    document.getElementById("myName").value,
      myAddr:    document.getElementById("myAddr").value,
      invoiceReg: document.getElementById("invoiceReg").value,
      myContact: document.getElementById("myContact").value,
    };
    localStorage.setItem("inv_issuer", JSON.stringify(data));
    showToast("自社情報を保存しました");
  };

  window.loadIssuer = function () {
    var raw = localStorage.getItem("inv_issuer");
    if (!raw) { showToast("保存された自社情報がありません"); return; }
    var data = JSON.parse(raw);
    document.getElementById("myName").value = data.myName || "";
    document.getElementById("myAddr").value = data.myAddr || "";
    document.getElementById("invoiceReg").value = data.invoiceReg || "";
    document.getElementById("myContact").value = data.myContact || "";
    render();
    showToast("自社情報を読み込みました");
  };

  /* ---------- SAVE / LOAD TEMPLATE ---------- */
  window.saveTemplate = function () {
    var v = getValues();
    var data = { values: v, items: items };
    localStorage.setItem("inv_template", JSON.stringify(data));
    showToast("テンプレートを保存しました");
  };

  window.loadTemplate = function () {
    var raw = localStorage.getItem("inv_template");
    if (!raw) { showToast("保存されたテンプレートがありません"); return; }
    var data = JSON.parse(raw);
    var v = data.values;
    document.getElementById("invNumber").value = v.invNumber || "";
    document.getElementById("invDate").value = v.invDate || "";
    document.getElementById("invDue").value = v.invDue || "";
    document.getElementById("clientName").value = v.clientName || "";
    document.getElementById("clientAddr").value = v.clientAddr || "";
    document.getElementById("clientContact").value = v.clientContact || "";
    document.getElementById("myName").value = v.myName || "";
    document.getElementById("myAddr").value = v.myAddr || "";
    document.getElementById("invoiceReg").value = v.invoiceReg || "";
    document.getElementById("myContact").value = v.myContact || "";
    document.getElementById("notes").value = v.notes || "";
    items = data.items || [];
    itemId = items.length > 0 ? Math.max.apply(null, items.map(function (i) { return i.id; })) : 0;
    renderItems();
    render();
    showToast("テンプレートを復元しました");
  };

  /* ---------- PRINT / PDF ---------- */
  window.printInvoice = function () {
    window.print();
  };

  /* ---------- CLEAR ---------- */
  window.clearAll = function () {
    if (!confirm("すべての入力をクリアしますか？")) return;
    document.getElementById("invNumber").value = "";
    document.getElementById("clientName").value = "";
    document.getElementById("clientAddr").value = "";
    document.getElementById("clientContact").value = "";
    document.getElementById("notes").value = "";
    // Keep issuer info & dates
    var today = new Date().toISOString().slice(0, 10);
    document.getElementById("invDate").value = today;
    var due = new Date();
    due.setDate(due.getDate() + 30);
    document.getElementById("invDue").value = due.toISOString().slice(0, 10);

    items = [];
    itemId = 0;
    addItem();
    render();
    showToast("入力をクリアしました（自社情報は保持）");
  };

  /* ---------- UTILS ---------- */
  function esc(s) { var d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }
  function num(n) { return n.toLocaleString("ja-JP"); }
  function nlToBr(s) { return s.replace(/\n/g, "<br>"); }
  function formatDate(s) {
    if (!s) return "—";
    var d = new Date(s + "T00:00:00");
    return d.getFullYear() + "年" + (d.getMonth() + 1) + "月" + d.getDate() + "日";
  }
  function showToast(msg) {
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(function () { t.classList.remove("show"); }, 2800);
  }

  /* ---------- START ---------- */
  document.addEventListener("DOMContentLoaded", init);
})();
</script>
</body>
</html>
